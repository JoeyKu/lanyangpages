<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎡 活動分發轉盤</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-bg: #fdfaf3;
      --secondary-bg: #ffffff;
      --text-color: #3d2c1b;
      --primary-color: #a87a4f;
      --accent-color: #d4a373;
      --border-color: #e8dcc4;
      --font-family: 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font-family);
      background-color: var(--primary-bg);
      color: var(--text-color);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding-bottom: 50px;
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header h1 {
      color: var(--primary-color);
      border-bottom: 2px solid var(--accent-color);
      padding-bottom: 10px;
      display: inline-block;
      margin-bottom: 15px;
    }
    .panel {
      background: var(--secondary-bg);
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 25px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
      border: 1px solid var(--border-color);
    }
    .settings {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }
    .input-group {
      flex: 1;
      min-width: 250px;
      display: flex;
      flex-direction: column;
    }
    label {
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 16px;
      color: var(--text-color);
    }
    textarea {
      background: var(--secondary-bg);
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 15px;
      border-radius: 8px;
      font-size: 15px;
      resize: vertical;
      line-height: 1.6;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: var(--font-family);
    }
    textarea:focus { 
      outline: none; 
      border-color: var(--primary-color); 
      box-shadow: 0 0 0 3px rgba(168, 122, 79, 0.15); 
    }
    .actions { 
      width: 100%; 
      display: flex; 
      gap: 15px; 
      justify-content: flex-end; 
      margin-top: 10px;
    }
    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.3s, transform 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-family);
    }
    .btn.primary { background: var(--primary-color); color: white; }
    .btn.primary:hover { background: var(--accent-color); transform: translateY(-2px); }
    .btn.outline { background: var(--secondary-bg); border: 1px solid var(--primary-color); color: var(--primary-color); }
    .btn.outline:hover { background: var(--primary-bg); transform: translateY(-2px); }
    .btn.success { background: #8b5e34; color: white; }
    .btn.success:hover { background: #684523; transform: translateY(-2px); }

    .interaction {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .wheel-wrapper {
      position: relative;
      margin-top: 20px;
    }
    .wheel-container {
      position: relative;
      width: 450px;
      height: 450px;
      background: var(--secondary-bg);
      border-radius: 50%;
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
      border: 8px solid var(--primary-bg);
      padding: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }
    .pointer {
      position: absolute;
      top: -30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 55px;
      color: #b84343;
      z-index: 10;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }
    .zones-section {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
      width: 100%;
    }
    .zone-btn {
      padding: 15px 35px;
      border-radius: 50px;
      background: var(--primary-color);
      color: white;
      border: none;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      transition: transform 0.2s, background-color 0.2s, opacity 0.2s;
      font-family: var(--font-family);
    }
    .zone-btn:hover:not(:disabled) {
      transform: translateY(-4px);
      background: var(--accent-color);
      box-shadow: 0 8px 15px rgba(0,0,0,0.1);
    }
    .zone-btn:active:not(:disabled) {
      transform: translateY(0);
    }
    .zone-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      filter: grayscale(0.5);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      border-radius: 8px;
      overflow: hidden;
      background: var(--secondary-bg);
      border: 1px solid var(--border-color);
    }
    th, td {
      padding: 16px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }
    th {
      background: var(--primary-bg);
      font-weight: 700;
      font-size: 16px;
      color: var(--primary-color);
      border-bottom: 2px solid var(--accent-color);
    }
    td { font-size: 15px; color: var(--text-color); }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #faf5eb; }
    
    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .table-header h2 { margin: 0; font-size: 22px; color: var(--primary-color); font-weight: 700; }
    .badge {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 6px;
      background: var(--primary-bg);
      border: 1px solid var(--primary-color);
      color: var(--primary-color);
      font-size: 14px;
      font-weight: 700;
    }

    /* responsive */
    @media(max-width: 600px) {
      .wheel-container { width: 300px; height: 300px; }
      .pointer { top: -25px; font-size: 45px; }
      .input-group { min-width: 100%; }
      .actions { flex-direction: column; }
      .btn { width: 100%; justify-content: center; }
      .table-header { flex-direction: column; gap: 15px; align-items: flex-start; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
     <h1>🎡 活動分發轉盤</h1>
     <p style="color: #66503c; font-size: 15px;">輸入活動與督導區後，按下督導區按鈕進行隨機分發</p>
  </div>
  
  <div class="panel settings">
     <div class="input-group">
        <label>活動清單 (一行一個)</label>
        <textarea id="activitiesInput" rows="6" placeholder="活動 1&#10;活動 2&#10;活動 3"></textarea>
     </div>
     <div class="input-group">
        <label>督導區清單 (一行一個)</label>
        <textarea id="zonesInput" rows="6" placeholder="第一區&#10;第二區">第一區
第二區</textarea>
     </div>
     <div class="actions">
        <button id="resetBtn" class="btn outline">↺ 重置資料</button>
        <button id="confirmBtn" class="btn primary">✓ 確認設定，開始分發</button>
     </div>
  </div>

  <div class="panel interaction" id="interactionPanel">
     <div class="wheel-wrapper">
       <div class="pointer">▼</div>
       <div class="wheel-container">
          <canvas id="wheelCanvas" width="800" height="800"></canvas>
       </div>
     </div>
     <div class="zones-section" id="zonesSection">
        <!-- Buttons will be generated here -->
     </div>
  </div>

  <div class="panel output">
     <div class="table-header">
       <h2>分發結果</h2>
       <button id="downloadBtn" class="btn success" style="display: none;">⬇ 下載 Excel</button>
     </div>
     <table id="resultTable">
        <thead>
           <tr>
             <th style="width: 60%;">活動名稱</th>
             <th style="width: 40%;">督導區</th>
           </tr>
        </thead>
        <tbody>
           <tr><td colspan="2" style="text-align: center; color: #a29180;">請先確認設定</td></tr>
        </tbody>
     </table>
  </div>
</div>

<script>
  let allItems = [];
  let pendingItems = [];
  let zones = [];
  let isSpinning = false;
  let currentAngle = 0;
  
  // Warm, natural temple palette
  let colors = [
    "#d4a373", "#e9c46a", "#f4a261", "#e76f51", "#8ab17d", 
    "#e29578", "#c89f74", "#cfba9e", "#f2cc8f", "#bc6c25",
    "#dda15e", "#b5838d", "#e5989b", "#ffb4a2", "#c1a57b"
  ];
  
  let canvas = document.getElementById('wheelCanvas');
  let ctx = canvas.getContext('2d');

  document.getElementById('confirmBtn').addEventListener('click', initData);
  document.getElementById('resetBtn').addEventListener('click', resetAll);
  document.getElementById('downloadBtn').addEventListener('click', downloadExcel);

  // Parse text inputs and prepare structured data
  function initData() {
    let actText = document.getElementById('activitiesInput').value;
    let zoneText = document.getElementById('zonesInput').value;
    
    let parsedActivities = actText.split('\n').map(s => s.trim()).filter(s => s);
    let parsedZones = zoneText.split('\n').map(s => s.trim()).filter(s => s);
    
    if(parsedActivities.length === 0 || parsedZones.length === 0) {
       alert("請輸入至少一個活動與一個督導區喲！");
       return;
    }
    
    // Initialize state mapping
    allItems = parsedActivities.map(name => ({ name, zone: '' }));
    pendingItems = [...parsedActivities];
    zones = [...parsedZones];
    currentAngle = 0;
    
    // Update Views
    renderTable();
    renderZones();
    drawWheel();
    
    document.getElementById('interactionPanel').style.display = 'flex';
    document.getElementById('downloadBtn').style.display = 'inline-flex';
    
    // Smooth scroll down to interaction panel
    setTimeout(()=> {
      document.getElementById('interactionPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }

  // Draw or update the result table
  function renderTable() {
    let tbody = document.querySelector('#resultTable tbody');
    tbody.innerHTML = '';
    
    if(allItems.length === 0) {
      tbody.innerHTML = '<tr><td colspan="2" style="text-align: center; color: #a29180;">請先確認設定</td></tr>';
      return;
    }
    
    allItems.forEach(item => {
      let tr = document.createElement('tr');
      // Style assigned rows differently
      if(item.zone) {
        tr.style.background = "#faf5eb";
      }
      let zoneHtml = item.zone ? `<span class="badge">${item.zone}</span>` : '<span style="color: #c9bcae">-</span>';
      
      tr.innerHTML = `
        <td style="${item.zone ? 'color: #66503c; font-weight: 500;' : 'color: #3d2c1b; font-weight: 700;'}">${item.name}</td>
        <td>${zoneHtml}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  // Generate buttons for each zone based on user input
  function renderZones() {
    let section = document.getElementById('zonesSection');
    section.innerHTML = '';
    zones.forEach(zone => {
      let btn = document.createElement('button');
      btn.className = 'zone-btn';
      btn.innerHTML = `${zone}`; // ✨ 
      btn.onclick = () => spinForZone(zone);
      section.appendChild(btn);
    });
  }

  // Canvas drawing logic for the Wheel
  function drawWheel() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    let cx = canvas.width / 2;
    let cy = canvas.height / 2;
    // slightly smaller than half width to leave margin
    let radius = cx - 20; 
    
    if(pendingItems.length === 0) {
       // Completed State
       ctx.beginPath();
       ctx.fillStyle = '#fdfaf3';
       ctx.arc(cx, cy, radius, 0, Math.PI*2);
       ctx.fill();
       
       ctx.fillStyle = '#a87a4f';
       ctx.font = 'bold 36px "Noto Sans TC"';
       ctx.textAlign = 'center';
       ctx.textBaseline = 'middle';
       ctx.fillText('✨ 所有活動已分發完畢 ✨', cx, cy);
       return;
    }
    
    let arc = Math.PI * 2 / pendingItems.length;
    
    for(let i = 0; i < pendingItems.length; i++) {
       let angle = currentAngle + i * arc;
       
       // Draw slice
       ctx.beginPath();
       ctx.fillStyle = colors[i % colors.length];
       ctx.moveTo(cx, cy);
       ctx.arc(cx, cy, radius, angle, angle + arc);
       ctx.fill();
       
       // Add stroke for nice separation
       ctx.lineWidth = 3;
       ctx.strokeStyle = "#ffffff";
       ctx.stroke();
       
       // Draw Text
       ctx.save();
       // Position text at ~65% of radius outwards
       let textRadius = radius * 0.65;
       let textAngle = angle + arc / 2;
       
       ctx.translate(cx + Math.cos(textAngle) * textRadius, cy + Math.sin(textAngle) * textRadius);
       // Rotate text to follow slice direction
       ctx.rotate(textAngle);
       
       ctx.fillStyle = '#ffffff';
       // Adjust font size based on slice count
       let fontSize = pendingItems.length > 15 ? 18 : 28;
       ctx.font = `bold ${fontSize}px "Noto Sans TC"`;
       ctx.textAlign = 'center';
       ctx.textBaseline = 'middle';
       // Add shadow to text for readability
       ctx.shadowColor = 'rgba(0,0,0,0.3)';
       ctx.shadowBlur = 4;
       ctx.shadowOffsetX = 1;
       ctx.shadowOffsetY = 1;
       
       let text = pendingItems[i];
       if(text.length > 10) text = text.substring(0, 9) + '...';
       ctx.fillText(text, 0, 0);
       ctx.restore();
    }
    
    // Draw Center Decor Circle
    ctx.beginPath();
    ctx.fillStyle = '#ffffff';
    ctx.arc(cx, cy, radius * 0.15, 0, Math.PI*2);
    ctx.fill();
    ctx.lineWidth = 5;
    ctx.strokeStyle = '#d4a373';
    ctx.stroke();
  }

  // Spin logic and easing animation
  function spinForZone(zoneName) {
    if(isSpinning || pendingItems.length === 0) return;
    isSpinning = true;
    
    // Disable interaction while spinning
    document.querySelectorAll('.zone-btn').forEach(b => b.disabled = true);
    document.getElementById('confirmBtn').disabled = true;
    document.getElementById('resetBtn').disabled = true;
    
    // Randomly pick a winning item
    let targetIndex = Math.floor(Math.random() * pendingItems.length);
    let arc = Math.PI * 2 / pendingItems.length;
    
    // Calculate final angle pointing TOP (-PI/2)
    // The center of the winning slice should land on -PI/2
    let targetAngleForPointer = -Math.PI / 2;
    let finalAngle = targetAngleForPointer - (targetIndex * arc + arc / 2);
    
    // Faster spin when only one item is left
    let isLastItem = pendingItems.length === 1;
    
    // Add extra spins (5 to 8 full rotations) for effect, reduce if last item
    let extraSpins = isLastItem ? 2 : Math.floor(Math.random() * 4) + 5;
    finalAngle += extraSpins * Math.PI * 2; 
    
    let startAngle = currentAngle;
    let diff = finalAngle - startAngle;
    let duration = isLastItem ? 1000 : 3500; // ms
    let startTime = null;
    
    function animate(time) {
       if(!startTime) startTime = time;
       let elapsed = time - startTime;
       
       if(elapsed < duration) {
          // Easing: easeOutQuart
          let t = elapsed / duration;
          let ease = 1 - Math.pow(1 - t, 4); 
          currentAngle = startAngle + diff * ease;
          drawWheel();
          requestAnimationFrame(animate);
       } else {
          // Animation Complete
          currentAngle = finalAngle % (Math.PI * 2);
          
          let winnerName = pendingItems[targetIndex];
          
          // Flash winning state on wheel briefly
          flashWinner(winnerName, () => {
             // Assign in data
             let itemRef = allItems.find(i => i.name === winnerName);
             if(itemRef) itemRef.zone = zoneName;
             
             // Remove from pending
             pendingItems.splice(targetIndex, 1);
             
             // Render Update
             renderTable();
             drawWheel();
             isSpinning = false;
             
             // Restore buttons
             document.getElementById('confirmBtn').disabled = false;
             document.getElementById('resetBtn').disabled = false;
             
             if(pendingItems.length > 0) {
                 document.querySelectorAll('.zone-btn').forEach(b => b.disabled = false);
             } else {
                // Trigger Confetti!
                triggerConfetti();
             }
          });
       }
    }
    
    requestAnimationFrame(animate);
  }

  // Highlight effect after spin stops
  function flashWinner(winnerName, callback) {
    drawWheel();
    // Fill screen with a slight flash or just run callback immediately
    // For now, let's keep it snappy
    setTimeout(callback, 200);
  }

  // Simple Confetti effect
  function triggerConfetti() {
    var count = 200;
    var defaults = { origin: { y: 0.7 } };

    function fire(particleRatio, opts) {
      confetti(Object.assign({}, defaults, opts, {
        particleCount: Math.floor(count * particleRatio)
      }));
    }

    fire(0.25, { spread: 26, startVelocity: 55 });
    fire(0.2, { spread: 60 });
    fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
    fire(0.1, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
    fire(0.1, { spread: 120, startVelocity: 45 });
  }

  // Export Table to Excel
  function downloadExcel() {
    if(allItems.length === 0) return;
    
    let ws_data = [["活動名稱", "督導區"]];
    allItems.forEach(i => {
       ws_data.push([i.name, i.zone || "未分發"]);
    });
    
    // Using SheetJS
    let ws = XLSX.utils.aoa_to_sheet(ws_data);
    let wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "分配結果");
    
    XLSX.writeFile(wb, "活動督導區分發結果.xlsx");
  }

  // Reset Everything
  function resetAll() {
    if(!confirm("確定要清除所有已設定的資料並重置嗎？")) return;
    
    document.getElementById('activitiesInput').value = '';
    // We can keep the default zones
    document.getElementById('zonesInput').value = '第一區\n第二區';
    document.getElementById('interactionPanel').style.display = 'none';
    document.getElementById('downloadBtn').style.display = 'none';
    
    allItems = [];
    pendingItems = [];
    zones = [];
    currentAngle = 0;
    isSpinning = false;
    
    renderTable();
    // Re-enable in case it was stuck
    document.getElementById('confirmBtn').disabled = false;
  }
</script>

</body>
</html>
