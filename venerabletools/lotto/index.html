<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>獎項卡片產生器</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js"></script>
</head>

<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center">
                        <h3 class="mb-0">獎項卡片產生器</h3>
                    </div>
                    <div class="card-body">
                        <div class="mb-4">
                            <label for="event-name" class="form-label fw-bold">1. 活動名稱</label>
                            <input type="text" id="event-name" class="form-control" placeholder="例如：佛光山蘭陽別院2025義工歲末聯誼會">
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">2. 選擇花邊樣式</label>
                            <div id="corner-options" class="d-flex flex-wrap gap-3 p-2 border rounded">
                                <!-- 由 JS 動態產生 -->
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">2. 選擇排版方式</label>
                            <div class="d-flex gap-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="layout" id="layout-2x2"
                                        value="2x2" checked>
                                    <label class="form-check-label" for="layout-2x2">
                                        一頁 2x2 張 (較大)
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="layout" id="layout-3x2"
                                        value="3x2">
                                    <label class="form-check-label" for="layout-3x2">
                                        一頁 3x2 張 (較多)
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="excel-file" class="form-label fw-bold">3. 上傳 Excel 檔案 (.xlsx)</label>
                            <input type="file" id="excel-file" class="form-control" accept=".xlsx">
                            <div class="form-text">請確保格式與 data.xlsx 一致（包含「獎項」、「編號」、「單位名稱」、「職稱姓名」）</div>
                        </div>

                        <div class="d-grid gap-2">
                            <button id="generate-btn" class="btn btn-success btn-lg" disabled>
                                <span id="btn-spinner" class="spinner-border spinner-border-sm d-none"
                                    role="status"></span>
                                <span id="btn-text">系統初始化中...</span>
                            </button>
                        </div>

                        <div id="status-container" class="mt-4 d-none">
                            <div class="alert alert-info">
                                <div id="status-msg">正在準備環境...</div>
                                <div class="progress mt-2" style="height: 10px;">
                                    <div id="progress-bar"
                                        class="progress-bar progress-bar-striped progress-bar-animated"
                                        role="progressbar" style="width: 0%"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
