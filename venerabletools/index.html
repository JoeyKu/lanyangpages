<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法師工具箱 - 蘭陽別院</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #a87a4f; /* Brown/Yellow theme */
            --accent-color: #d4a373;
            --bg-color: #fdfaf3;
            --card-bg: #ffffff;
            --text-main: #3d2c1b;
            --text-secondary: #a87a4f;
            --shadow: 0 10px 25px rgba(168, 122, 79, 0.1);
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 50px 40px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(168, 122, 79, 0.1);
            text-align: center;
        }

        .header {
            margin-bottom: 40px;
        }

        .header .icon {
            font-size: 48px;
            margin-bottom: 15px;
            display: block;
        }

        .header h1 {
            font-family: 'Outfit', 'Noto Sans TC', sans-serif;
            font-size: 32px;
            color: var(--primary-color);
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .header p {
            color: var(--accent-color);
            font-size: 16px;
            opacity: 0.8;
        }

        .link-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 18px 24px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 500;
            transition: var(--transition);
            box-shadow: 0 4px 12px rgba(168, 122, 79, 0.15);
        }

        .link-btn svg {
            width: 20px;
            height: 20px;
        }

        .link-btn.secondary {
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            box-shadow: none;
            margin-top: 10px;
        }

        @media (hover: hover) {
            .link-btn:hover {
                background-color: var(--accent-color);
                transform: translateY(-3px);
                box-shadow: 0 8px 20px rgba(168, 122, 79, 0.2);
            }
            .link-btn.secondary:hover {
                background-color: var(--bg-color);
                color: var(--accent-color);
                border-color: var(--accent-color);
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 40px 20px;
            }
            .header h1 {
                font-size: 28px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <span class="icon">🪷</span>
            <h1>法師工具箱</h1>
            <p>蘭陽別院專屬工具管理</p>
        </div>
        
        <div class="link-container">
            <a href="meeting_table.html" class="link-btn">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                月例會時間表產生器
            </a>
            <a href="lotto/index.html" class="link-btn">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                獎項卡片產生器
            </a>
            <a href="../index.html" class="link-btn secondary">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                返回首頁
            </a>
        </div>
    </div>
</body>

</html>
