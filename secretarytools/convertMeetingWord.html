<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轉換會議文件</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Outfit:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-color: #a87a4f;
            --accent-color: #d4a373;
            --bg-color: #fdfaf3;
            --sidebar-bg: #3d2c1b;
            --sidebar-text: #fdfaf3;
            --card-bg: #ffffff;
            --text-main: #3d2c1b;
            --text-secondary: #6b4f35;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --radius: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            font-size: 20px;
            line-height: 1.75;
            padding: 40px 20px;
        }

        main {
            width: 100%;
            max-width: 800px;
            flex-grow: 0;
        }

        .header {
            margin-bottom: 40px;
            text-align: center;
            position: relative;
        }

        .header h1 {
            font-size: 42px;
            color: var(--primary-color);
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-secondary);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary-color);
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            transition: var(--transition);
        }

        .back-btn:hover {
            color: var(--accent-color);
            transform: translateX(-5px);
        }

        .tool-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 40px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(168, 122, 79, 0.1);
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
            color: var(--primary-color);
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 18px;
            font-family: inherit;
        }

        input:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--accent-color);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(212, 163, 115, 0.1);
        }

        .actions {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        button {
            padding: 14px 28px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 18px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--accent-color);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: #f0f0f0;
            color: var(--text-main);
        }

        .btn-secondary:hover {
            background-color: #e5e5e5;
        }

        .output-group {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 24px;
            border: 1px dashed var(--accent-color);
            position: relative;
        }

        .copy-toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--sidebar-bg);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transform: translateY(100px);
            opacity: 0;
            transition: var(--transition);
        }

        .copy-toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .error {
            color: #e74c3c;
            font-size: 16px;
            margin-top: 5px;
        }

        @media (max-width: 640px) {
            main { padding: 0; }
            .header h1 { font-size: 32px; }
            .tool-card { padding: 20px; }
        }
    </style>
</head>

<body>
    <main>
        <a href="index.html" class="back-btn">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"></path>
            </svg>
            返回工具箱
        </a>
        <div class="header">
            <h1>轉換會議文件</h1>
            <p>自動修改月例會 Word 文件中的日期、時間、地點等資訊。</p>
        </div>

        <div class="tool-card">
            <form id="docForm">
                <div class="input-group">
                    <label for="date">日期</label>
                    <input type="text" id="date" name="date" placeholder="YYYY-MM-DD" required>
                    <div id="dateError" class="error"></div>
                </div>

                <div class="input-group">
                    <label for="time">時間</label>
                    <input type="text" id="time" name="time" placeholder="HH:MM" required>
                    <div id="timeError" class="error"></div>
                </div>

                <div class="input-group">
                    <label for="room">地點</label>
                    <input type="text" id="room" name="room" placeholder="例如：蘭陽別院4樓405室" required>
                </div>

                <div class="input-group">
                    <label for="name">分會名稱</label>
                    <input type="text" id="name" name="name" placeholder="例如：宜六" required>
                </div>

                <div class="input-group">
                    <label for="file">上傳 Word 檔案 (.docx)</label>
                    <input type="file" id="file" name="file" accept=".docx" required>
                </div>

                <div class="actions">
                    <button type="button" class="btn-primary" onclick="submitForm()">
                        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                        下載修改後 Word 檔
                    </button>
                </div>
            </form>

            <div id="loading" style="display: none; text-align: center; margin-top: 20px;">
                <div style="display: inline-block; width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary-color); border-radius: 50%; animation: spin 1s linear infinite;"></div>
                <p style="margin-top: 10px; color: var(--text-secondary);">處理中，請稍候...</p>
            </div>

            <div id="alertBox" class="error" style="display: none; text-align: center; margin-top: 20px;"></div>
        </div>
    </main>

    <div id="toast" class="copy-toast">已複製到剪貼簿！</div>

    <script>
        function validateDate(dateStr) {
            const regex = /^\d{4}-\d{2}-\d{2}$/;
            if (!regex.test(dateStr)) return false;
            const date = new Date(dateStr);
            return date instanceof Date && !isNaN(date);
        }

        function validateTime(timeStr) {
            const regex = /^\d{2}:\d{2}$/;
            if (!regex.test(timeStr)) return false;
            const [hours, minutes] = timeStr.split(':').map(Number);
            return hours >= 0 && hours <= 23 && minutes >= 0 && minutes <= 59;
        }

        function showError(elementId, message) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.style.display = message ? 'block' : 'none';
        }

        document.getElementById('date').addEventListener('input', function() {
            const isValid = validateDate(this.value);
            showError('dateError', isValid ? '' : '請輸入正確的日期格式 YYYY-MM-DD');
        });

        document.getElementById('time').addEventListener('input', function() {
            const isValid = validateTime(this.value);
            showError('timeError', isValid ? '' : '請輸入正確的時間格式 HH:MM');
        });

        async function submitForm() {
            const form = document.getElementById('docForm');

            // 驗證日期和時間
            const dateValue = document.getElementById('date').value;
            const timeValue = document.getElementById('time').value;

            let hasError = false;
            if (!validateDate(dateValue)) {
                showError('dateError', '請輸入正確的日期格式 YYYY-MM-DD');
                hasError = true;
            }
            if (!validateTime(timeValue)) {
                showError('timeError', '請輸入正確的時間格式 HH:MM');
                hasError = true;
            }

            if (hasError) return;

            // 原生 HTML5 表單驗證
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const formData = new FormData(form);

            // 顯示載入動畫
            document.getElementById('loading').style.display = 'block';
            document.getElementById('alertBox').style.display = 'none';

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    // 處理檔案下載
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');

                    // 設定預設檔名
                    const originalName = document.getElementById('file').files[0].name;
                    const newName = originalName.replace('.docx', `_修改版.docx`);

                    a.href = url;
                    a.download = newName;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    window.URL.revokeObjectURL(url);
                } else {
                    // 顯示錯誤訊息
                    const errorData = await response.json();
                    document.getElementById('alertBox').innerText = '❌ 錯誤：' + errorData.error;
                    document.getElementById('alertBox').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('alertBox').innerText = '❌ 系統發生未知錯誤';
                document.getElementById('alertBox').style.display = 'block';
            } finally {
                // 隱藏載入動畫
                document.getElementById('loading').style.display = 'none';
            }
        }

        // ── Toast ──
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.classList.add('show');
            clearTimeout(t._timer); t._timer = setTimeout(() => t.classList.remove('show'), 2200);
        }
    </script>

    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
