            --primary-color: #a87a4f;

            font-family: 'Noto Sans TC', sans-serif;

            color: var(--text-main);

            width: 280px;
            background-color: var(--sidebar-bg);
            color: var(--sidebar-text);
            padding: 40px 20px;

            flex-direction: column;
            gap: 30px;
            position: sticky;
            top: 0;
            min-height: 100vh;
            flex-shrink: 0;

            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            font-weight: 600;
            padding-left: 15px;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent-color);

        .nav-links { display:flex; flex-direction:column; gap:10px; }
        .nav-link {
            padding: 15px 20px;
            border-radius: 12px;
            text-decoration: none;
            color: var(--sidebar-text);
            font-size: 16px;
            opacity: 0.7;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .nav-link.active { background-color:rgba(255,255,255,0.1); opacity:1; font-weight:600; }
        .nav-link:hover { opacity:1; background-color:rgba(255,255,255,0.05); }
        main { flex-grow:1; padding:60px; max-width:1200px; }
        .header { margin-bottom:40px; }
        .header h1 { font-size:42px; color:var(--primary-color); margin-bottom:8px; }
        .header p { color:var(--text-secondary); }
        .tool-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 40px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(168,122,79,0.1);
        }
        .section-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 32px 0 16px;
            padding-bottom: 8px;
            border-bottom: 2px solid rgba(168,122,79,0.15);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title:first-of-type { margin-top:0; }
        .input-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
        .input-group { margin-bottom:16px; }
        label {
            font-weight: 600;
            color: var(--primary-color);
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            display: block;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 17px;
            font-family: inherit;
            background: #fafafa;
            transition: var(--transition);
        }
        input[type="date"] { cursor:pointer; }
        input:focus, select:focus {
            outline: none;
            border-color: var(--accent-color);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(212,163,115,0.12);
        }
        input[type="file"] { padding:10px; font-size:15px; cursor:pointer; }
        .actions { display:flex; gap:15px; margin-top:28px; }
        button {
            padding: 14px 28px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 18px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
        }
        .btn-primary { background-color:var(--primary-color); color:white; }
        .btn-primary:hover:not(:disabled) { background-color:var(--accent-color); transform:translateY(-2px); }
        .btn-primary:disabled { opacity:0.6; cursor:not-allowed; }
        .error { color:#e74c3c; font-size:14px; margin-top:4px; }
        .spinner {
            display: inline-block;
            width: 36px; height: 36px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
        .copy-toast {
            position: fixed; bottom:30px; right:30px;
            background: var(--sidebar-bg); color:white;
            padding: 12px 24px; border-radius:30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transform: translateY(100px); opacity:0;
            transition: var(--transition);
        }
        .copy-toast.show { transform:translateY(0); opacity:1; }
        @media (max-width:900px) {
            nav { width:80px; padding:40px 10px; }
            .logo, .nav-link span { display:none; }
            main { padding:30px; }
            .input-row { grid-template-columns:1fr; }
        }
        @media (max-width:640px) {
            nav { width:60px; padding:20px 8px; }
            .logo { display:none; }
            .nav-link { padding:12px 8px; flex-direction:column; gap:4px; text-align:center; }
            .nav-link span { display:block; font-size:9px; }
            main { padding:20px; }
            .header h1 { font-size:26px; }
            .tool-card { padding:20px; }
            .input-row { grid-template-columns:1fr; }
        }
    </style>
</head>

    <main>
        <div class="header">
            <h1>轉換會議文件</h1>
            <p>自動修改聯合月例會 Word 文件中的日期、時間、地點等資訊，以利分會使用。</p>
        </div>

        <div class="tool-card">
            <form id="docForm">

                <div class="section-title">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                    會議基本資訊
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="date">日期</label>
                        <input type="date" id="date" name="date" required>
                        <div id="dateError" class="error"></div>
                    </div>

                    <div class="input-group">
                        <label for="time">時間</label>
                        <input type="text" id="time" name="time" placeholder="例如：19:30" required>
                        <div id="timeError" class="error"></div>
                    </div>

                    <div class="input-group">
                        <label for="room">地點</label>
                        <input type="text" id="room" name="room" placeholder="例如：蘭陽別院3樓305室" required>
                    </div>

                    <div class="input-group">
                        <label for="name">分會名稱</label>
                        <input type="text" id="name" name="name" placeholder="例如：宜六" required>
                    </div>
                </div>

                <div class="section-title">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/>
                    </svg>
                    會議人員
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="chairman">主席</label>
                        <input type="text" id="chairman" name="chairman" placeholder="例如：OOO會長" required>
                    </div>

                    <div class="input-group">
                        <label for="mc">司儀</label>
                        <input type="text" id="mc" name="mc" placeholder="例如：王小明" required>
                    </div>

                    <div class="input-group">
                        <label for="computer">電腦</label>
                        <input type="text" id="computer" name="computer" placeholder="例如：王小明" required>
                    </div>
                </div>

                <div class="section-title">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>

                        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>

    <div id="toast" class="copy-toast">已複製到剪貼簿！</div>

    <script>
        let pyodide;
        const submitBtn  = document.getElementById('submitBtn');
        const loadingDiv = document.getElementById('loading');
        const alertBox   = document.getElementById('alertBox');

        const LS_FIELDS = ['time', 'room', 'name', 'chairman', 'mc', 'computer'];

        function saveToLocalStorage() {
            LS_FIELDS.forEach(id => {
                localStorage.setItem('meeting_' + id, document.getElementById(id).value);
            });
        }

        function loadFromLocalStorage() {
            LS_FIELDS.forEach(id => {
                const val = localStorage.getItem('meeting_' + id);
                if (val !== null && val !== '') {
                    document.getElementById(id).value = val;
                }
            });
        }

        LS_FIELDS.forEach(id => {
            document.getElementById(id).addEventListener('input', saveToLocalStorage);
        });

        function validateDate(dateStr) {
            if (!dateStr) return false;
            const d = new Date(dateStr);
            return d instanceof Date && !isNaN(d);
        }

        function validateTime(timeStr) {
            if (!/^\d{2}:\d{2}$/.test(timeStr)) return false;
            const [h, m] = timeStr.split(':').map(Number);
            return h >= 0 && h <= 23 && m >= 0 && m <= 59;
        }

        function showError(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.style.display = msg ? 'block' : 'none';
        }

        document.getElementById('time').addEventListener('input', function () {
            showError('timeError', validateTime(this.value) ? '' : '請輸入正確的時間格式 HH:MM');
        });

        function escapePy(str) {
            return str.replace(/\\/g, '\\\\').replace(/"""/g, '\\"\\"\\"');
        }

        async function submitForm() {
            const dateValue     = document.getElementById('date').value.trim();
            const timeValue     = document.getElementById('time').value.trim();
            const roomValue     = document.getElementById('room').value.trim();
            const nameValue     = document.getElementById('name').value.trim();
            const chairmanValue = document.getElementById('chairman').value.trim();
            const mcValue       = document.getElementById('mc').value.trim();
            const computerValue = document.getElementById('computer').value.trim();
            const fileInput     = document.getElementById('file');

            let hasError = false;
            if (!validateDate(dateValue)) {
                showError('dateError', '請選擇日期');
                hasError = true;
            } else {
                showError('dateError', '');
            }
            if (!validateTime(timeValue)) {
                showError('timeError', '請輸入正確的時間格式 HH:MM');
                hasError = true;
            }
            if (hasError) return;

            if (!document.getElementById('docForm').checkValidity()) {
                document.getElementById('docForm').reportValidity();
                return;
            }

            if (!fileInput.files[0]) {
                alertBox.innerText = '❌ 請先選擇 Word 檔案';
                alertBox.style.color = '#e74c3c';
                alertBox.style.display = 'block';
                return;
            }

            loadingDiv.style.display = 'block';
            alertBox.style.display = 'none';
            submitBtn.disabled = true;

            try {
                const file = fileInput.files[0];
                const fileData = await file.arrayBuffer();
                pyodide.FS.writeFile('/input.docx', new Uint8Array(fileData));

                const pythonCode = `
from docx import Document
from docx.oxml.ns import qn
from docx.oxml import OxmlElement
from docx.shared import Pt
from datetime import datetime

ROC_YEAR_OFFSET = 1911
WEEKDAY_ZH = ['星期一', '星期二', '星期三', '星期四', '星期五', '星期六', '星期日']

def format_date_cell(date_str, time_str, room_str):
    dt = datetime.strptime(date_str, "%Y-%m-%d")
    roc_year = dt.year - ROC_YEAR_OFFSET
    month = dt.month
    day = dt.day
    weekday = WEEKDAY_ZH[dt.weekday()]
    hour, minute = map(int, time_str.split(':'))
    if 18 <= hour <= 23:
        period = "晚上"
        display_hour = hour - 12 if hour > 12 else hour
    elif 12 <= hour < 18:
        period = "下午"
        display_hour = hour - 12
    else:
        period = "早上"
        display_hour = hour
    time_display = f"{period}{display_hour:02d}:{minute:02d}"
    return (
        f"日期：{roc_year} 年{month:02d}月{day:02d}日（{weekday}）\\n"
        f"時間：{time_display}\\n"
        f"地點：{room_str}"
    )

def set_cell_text(cell, text, font_size=11):
    cell.text = text
    for p in cell.paragraphs:
        for run in p.runs:
            run.font.name = "標楷體"
            run._element.rPr.rFonts.set(qn('w:eastAsia'), '標楷體')
            run.font.size = Pt(font_size)

def set_cell_text_table_align(cell, text, font_size=11):
    if cell.paragraphs:
        p = cell.paragraphs[0]
        p.text = ""
        run = p.add_run(text)
        run.font.name = "標楷體"
        run._element.rPr.rFonts.set(qn('w:eastAsia'), '標楷體')
        run.font.size = Pt(font_size)
        for i in range(len(cell.paragraphs)-1, 0, -1):
            p_elem = cell.paragraphs[i]._element
            p_elem.getparent().remove(p_elem)
    else:
        cell.text = text

def replace_text_in_paragraph(paragraph, old_text, new_text, font_size=None):
    full_text = "".join(run.text for run in paragraph.runs)
    if old_text not in full_text:
        return False
    for i, run in enumerate(paragraph.runs):
        run.text = "" if i > 0 else full_text.replace(old_text, new_text)
        if i == 0 and font_size:
            run.font.name = "標楷體"
            run.font.size = Pt(font_size)
            if run._element.rPr is not None:
                run._element.rPr.rFonts.set(qn('w:eastAsia'), '標楷體')
    return True

def replace_in_document(doc, old_text, new_text, font_size=None):
    for para in doc.paragraphs:
        replace_text_in_paragraph(para, old_text, new_text, font_size)
    for table in doc.tables:
        for row in table.rows:
            for cell in row.cells:
                for para in cell.paragraphs:
                    replace_text_in_paragraph(para, old_text, new_text, font_size)


def style_text_in_paragraph(paragraph, search_text, cell=None):
    """將段落中出現的 search_text 標記為粗體 + 黃色底色，
       如果傳入 cell，則同時把整個儲存格背景設為黃色"""
    full_text = "".join(run.text for run in paragraph.runs)
    if search_text not in full_text:
        return False

    # --- 文字樣式處理（粗體 + 黃色文字底色）---
    font_name = "標楷體"
    font_size = None
    for run in paragraph.runs:
        if run.font.name:
            font_name = run.font.name
        if run.font.size:
            font_size = run.font.size
        if font_size:
            break

    paragraph.clear()
    parts = full_text.split(search_text)
    for i, part in enumerate(parts):
        if part:
            run = paragraph.add_run(part)
            run.font.name = font_name
            rPr = run._element.get_or_add_rPr()
            rPr.rFonts.set(qn('w:eastAsia'), font_name)
            if font_size:
                run.font.size = font_size

        if i < len(parts) - 1:
            run = paragraph.add_run(search_text)
            run.bold = True
            run.font.name = "標楷體"
            rPr = run._element.get_or_add_rPr()
            rPr.rFonts.set(qn('w:eastAsia'), '標楷體')
            if font_size:
                run.font.size = font_size
            
            # 文字本身黃色底色（可保留或移除）
            shd = OxmlElement('w:shd')
            shd.set(qn('w:val'), 'clear')
            shd.set(qn('w:color'), 'auto')
            shd.set(qn('w:fill'), 'FFFF00')   # 文字底色黃色
            rPr.append(shd)

    # --- 新增：如果有傳入 cell，則把整個儲存格背景設為黃色 ---
    if cell is not None:
        tcPr = cell._element.get_or_add_tcPr()
        shd = OxmlElement('w:shd')
        shd.set(qn('w:val'), 'clear')
        shd.set(qn('w:color'), 'auto')
        shd.set(qn('w:fill'), 'FFFF00')   # 整個儲存格黃色背景
        tcPr.append(shd)

    return True

def style_text_in_paragraph_old(paragraph, search_text):
    """將段落中所有出現的 search_text 標記為粗體 + 灰色底色（標楷體）"""
    full_text = "".join(run.text for run in paragraph.runs)
    if search_text not in full_text:
        return False

    # 掃描所有 runs 取得字體資訊，不只取 runs[0]
    font_name = "標楷體"
    font_size = None
    for run in paragraph.runs:
        if run.font.name:
            font_name = run.font.name
        if run.font.size:
            font_size = run.font.size
        if font_size:
            break

    # 清除段落並重建 runs
    paragraph.clear()
    parts = full_text.split(search_text)
    for i, part in enumerate(parts):
        # 普通文字 run
        if part:
            run = paragraph.add_run(part)
            run.font.name = font_name
            rPr = run._element.get_or_add_rPr()
            rPr.rFonts.set(qn('w:eastAsia'), font_name)
            if font_size:
                run.font.size = font_size

        # 分會名稱 run：粗體 + 灰色底色
        if i < len(parts) - 1:
            run = paragraph.add_run(search_text)
            run.bold = True
            run.font.name = "標楷體"
            rPr = run._element.get_or_add_rPr()
            rPr.rFonts.set(qn('w:eastAsia'), '標楷體')
            if font_size:
                run.font.size = font_size
            # 加灰色底色（CCCCCC = 淺灰，黑白列印約 20% 灰）
            shd = OxmlElement('w:shd')
            shd.set(qn('w:val'), 'clear')
            shd.set(qn('w:color'), 'auto')
            shd.set(qn('w:fill'), 'FFFF00')
            rPr.append(shd)
    return True

def delete_textbox_containing(doc, search_text):
    WPS = 'http://schemas.microsoft.com/office/word/2010/wordprocessingShape'
    W   = 'http://schemas.openxmlformats.org/wordprocessingml/2006/main'
    body = doc.element.body
    for txbx in body.findall('.//' + '{' + WPS + '}txbx'):
        text = ''.join(t.text or '' for t in txbx.findall('.//' + '{' + W + '}t'))
        if search_text in text:
            node = txbx
            for _ in range(8):
                node = node.getparent()
            parent = node.getparent()
            if parent is not None:
                parent.remove(node)
